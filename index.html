<!DOCTYPE html>
<html>
  <head>
    <title>Calc of Time Ratio for Motogymkhana</title>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body style="font-size:48px;text-align:center">
<h1 style="font-size:1.6em;line-height:0.8em">
Calc of Time Ratio
<span style="font-size:0.6em"><br>for Motogymkhana</span>
</h1>

<div style="text-align:center">
<label>Top Time&nbsp; <span style="font-size:0.6em">(6-digit number)&nbsp;Required</span><br>
<input type="text" id="top"  style="font-size:100%;background:lightcyan"></label>
</div>

<div style="margin-top:1em;text-align:center">
<label>Your Time&nbsp;<span style="font-size:0.6em">(6-digit number)&nbsp;Non-required</span><br>
<input type="text" id="user" style="font-size:100%;background:lightcyan"></label>
</div>

<div style="margin-top:1em;text-align:center;margin-bottom:2em">
<button id="button" style="font-size:100%;padding:0.5em;border:solid 2px;border-radius:0.4em;color:black">Enter</button>
</div>

<table style="width:15em;margin:auto">
<tr><th colspan="3" style="background-color:lightgray;font-weight:normal">Top</th></tr>
<tr><td>100.00%</td><td style="width:3em"></td><td id="top_time" style="color:silver;text-align:left">0:00.000</td></tr>
<tr><th colspan="3">&nbsp;</th></tr>
<tr><th colspan="3" style="background-color:lightgray;font-weight:normal">You</th></tr>
<tr><td id="user_ratio" style="color:silver">999.99%</td><td></td><td id="user_time" style="color:silver;text-align:left">9:59.999</td></tr>
<tr><th colspan="3">&nbsp;</th></tr>
<tr><th colspan="3" style="background-color:lightgray;font-weight:normal">Border</th></tr>
<tr><td>105.00%</td><td id="U105" style="color:silver">－</td><td id="105" style="color:silver;text-align:left">0:00.000 00</td></tr>
<tr><td>106.00%</td><td id="U106" style="color:silver">－</td><td id="106" style="color:silver;text-align:left">0:00.000 00</td></tr>
<tr><td>110.00%</td><td id="U110" style="color:silver">－</td><td id="110" style="color:silver;text-align:left">0:00.000 00</td></tr>
<tr><td>115.00%</td><td id="U115" style="color:silver">－</td><td id="115" style="color:silver;text-align:left">0:00.000 00</td></tr>
<tr><td>120.00%</td><td id="U120" style="color:silver">－</td><td id="120" style="color:silver;text-align:left">0:00.000 00</td></tr>
</table>

<div style="margin-top:2em;font-size:0.6em;text-align:center">
Author: <a href="mailto:hideki.abe@nifty.com">Hideki Abe</a><br>
Release: 2026-03-24
</div>

<script>

document.getElementById('button').addEventListener('click',myTimeRate);

function myTimeRate(){
  let ele_top       =document.getElementById('top'       );
  let ele_user      =document.getElementById('user'      );
  let ele_top_time  =document.getElementById('top_time'  );
  let ele_105       =document.getElementById('105'       );
  let ele_106       =document.getElementById('106'       );
  let ele_110       =document.getElementById('110'       );
  let ele_115       =document.getElementById('115'       );
  let ele_120       =document.getElementById('120'       );
  let ele_U105      =document.getElementById('U105'      );
  let ele_U106      =document.getElementById('U106'      );
  let ele_U110      =document.getElementById('U110'      );
  let ele_U115      =document.getElementById('U115'      );
  let ele_U120      =document.getElementById('U120'      );
  let ele_user_time =document.getElementById('user_time' );
  let ele_user_ratio=document.getElementById('user_ratio');
  ele_top_time  .textContent='0:00.000';
  ele_105       .textContent='0:00.00000';
  ele_106       .textContent='0:00.00000';
  ele_110       .textContent='0:00.00000';
  ele_115       .textContent='0:00.00000';
  ele_120       .textContent='0:00.00000';
  ele_U105      .textContent='－';
  ele_U106      .textContent='－';
  ele_U110      .textContent='－';
  ele_U115      .textContent='－';
  ele_U120      .textContent='－';
  ele_user_time .textContent='9:59.999';
  ele_user_ratio.textContent='999.99%';
  ele_top       .style.background='pink';
  ele_user      .style.background='pink';
  ele_top_time  .style.color='silver';
  ele_105       .style.color='silver';
  ele_106       .style.color='silver';
  ele_110       .style.color='silver';
  ele_115       .style.color='silver';
  ele_120       .style.color='silver';
  ele_U105      .style.color='silver';
  ele_U106      .style.color='silver';
  ele_U110      .style.color='silver';
  ele_U115      .style.color='silver';
  ele_U120      .style.color='silver';
  ele_user_time .style.color='silver';
  ele_user_ratio.style.color='silver';
  const topTime=timeValue(ele_top.value);
  if(topTime>0){
    ele_top.style.background='lightcyan';
    const time105=topTime*105;
    const time106=topTime*106;
    const time110=topTime*110;
    const time115=topTime*115;
    const time120=topTime*120;
    ele_top_time.textContent=timeText(topTime);
    ele_105     .textContent=timeText2(Math.round(time105));
    ele_106     .textContent=timeText2(Math.round(time106));
    ele_110     .textContent=timeText2(Math.round(time110));
    ele_115     .textContent=timeText2(Math.round(time115));
    ele_120     .textContent=timeText2(Math.round(time120));
    ele_top_time.style.color='blue';
    ele_105     .style.color='blue';
    ele_106     .style.color='blue';
    ele_110     .style.color='blue';
    ele_115     .style.color='blue';
    ele_120     .style.color='blue';
    const userTime=timeValue(ele_user.value);
    if(userTime>0){
      ele_user.style.background='lightcyan';
      ele_user_time .textContent=timeText(userTime);
      ele_user_ratio.textContent=perText(Math.round(10000*userTime/topTime));
      ele_user_time .style.color='blue';
      ele_user_ratio.style.color='blue';
      if(userTime*100<time105){ ele_U105.textContent='★'; ele_U105.style.color='blue'; }
      if(userTime*100<time106){ ele_U106.textContent='★'; ele_U106.style.color='blue'; }
      if(userTime*100<time110){ ele_U110.textContent='★'; ele_U110.style.color='blue'; }
      if(userTime*100<time115){ ele_U115.textContent='★'; ele_U115.style.color='blue'; }
      if(userTime*100<time120){ ele_U120.textContent='★'; ele_U120.style.color='blue'; }
    }
  }
}

function timeValue(text){
  if((typeof text)!='string') return 0;
  const text0=toHalfWidth(text);
  const v
    =Number( text0      .slice(0,1))*1000*60
    +Number((text0+'0' ).slice(1,3))*1000
    +Number((text0+'00').slice(3,6));
  if(isNaN(v)) return 0;
  return v;
}

function timeText(v){
  const text
    =String(Math.floor( v/1000 /60)+10   ).slice(1)+':'
    +String(Math.floor((v/1000)%60)+100  ).slice(1)+'.'
    +String(Math.floor((v%1000)    +1000)).slice(1);
  return text;
}

function timeText2(v){
  let text
    =String(Math.floor( v/100/1000 /60)+10     ).slice(1)+':'
    +String(Math.floor((v/100/1000)%60)+100    ).slice(1)+'.'
    +String(Math.floor((v%100000)      +100000)).slice(1);
  text=text.slice(0,8)+' '+text.slice(8);
  return text;
}

function perText(v){
  if(v>99999) return '999.99%';
  const text
    =String(Math.floor(v/100)+1000).slice(1)+'.'
    +String(Math.floor(v%100)+100 ).slice(1)+'%';
  return text;
}

function toHalfWidth(str) {  // 全角英数字を半角に変換
  str = str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });
  return str;
}

</script>
  </body>
</html>
